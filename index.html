<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Юридические документы — Robilko</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      color: #1a1a1a;
      background: #f9f9f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #1b5e20;
      color: #fff;
      padding: 40px 24px 32px;
      text-align: center;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }
    header p  { font-size: 0.9rem; opacity: 0.8; }
    main {
      max-width: 640px;
      margin: 40px auto;
      padding: 0 20px;
      flex: 1;
    }
    h2 { font-size: 1rem; color: #555; font-weight: 600; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em; }
    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 16px;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: box-shadow 0.15s;
    }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10); }
    .icon {
      width: 48px; height: 48px;
      background: #e8f5e9;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }
    .card-title { font-weight: 600; font-size: 1rem; color: #1a1a1a; margin-bottom: 2px; }
    .card-sub   { font-size: 0.85rem; color: #888; }
    footer {
      text-align: center;
      font-size: 0.8rem;
      color: #bbb;
      padding: 32px 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>Юридические документы</h1>
  <p>Robilko Apps</p>
</header>

<main>
  <h2>Политики конфиденциальности</h2>

  <a class="card" href="shoplist/">
    <div class="icon">🛒</div>
    <div>
      <div class="card-title">Список покупок</div>
      <div class="card-sub">com.robilko.shoplist · Android &amp; iOS</div>
    </div>
  </a>

</main>

<footer>
  <p>© 2025 Робилко Александр Александрович · <a href="mailto:sasha.robson@gmail.com" style="color:#aaa">sasha.robson@gmail.com</a></p>
</footer>

</body>
</html>
